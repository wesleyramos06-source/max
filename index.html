<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutQuiz - O Desafio Supremo</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --success: #00b894;
            --danger: #d63031;
            --dark: #2d3436;
            --light: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6c5ce7, #00cec9);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
        }

        .container {
            background: white;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Telas */
        .screen { display: none; animation: fadeIn 0.5s ease; }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Botões */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            margin: 10px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }

        .btn:hover { background: var(--secondary); transform: scale(1.05); }

        /* Estilo Quiz */
        .options-container {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }

        .option-btn {
            background: var(--light);
            border: 2px solid #eee;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
            font-size: 1rem;
        }

        .option-btn:hover { border-color: var(--primary); background: #f0f0ff; }

        .difficulty-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: white;
        }

        .easy { background: #2ecc71; }
        .medium { background: #f1c40f; }
        .hard { background: #e67e22; }
        .extreme { background: #e74c3c; }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #666;
        }

        #timer { color: var(--danger); }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-screen" class="screen active">
            <h1 style="font-size: 2.5rem; color: var(--primary);">⚽ FutQuiz</h1>
            <p>Prove que você é um mestre do futebol mundial!</p>
            <div style="margin: 30px 0;">
                <small>30 Perguntas • Nível Crescente • Recorde de Tempo</small>
            </div>
            <button class="btn" onclick="startGame()">JOGAR</button>
        </div>

        <div id="game-screen" class="screen">
            <div class="stats-bar">
                <span id="question-number">Pergunta: 1/30</span>
                <span id="timer">Tempo: 00:00</span>
            </div>
            <div id="difficulty" class="difficulty-badge">Fácil</div>
            <h2 id="question-text">Carregando pergunta...</h2>
            <div id="options" class="options-container">
                </div>
        </div>

        <div id="result-screen" class="screen">
            <h2>🏆 Fim de Jogo!</h2>
            <div style="font-size: 1.2rem; margin: 20px 0; text-align: left; display: inline-block;">
                <p>✅ Acertos: <span id="res-correct" style="color: var(--success)">0</span></p>
                <p>❌ Erros: <span id="res-wrong" style="color: var(--danger)">0</span></p>
                <p>⏱️ Tempo Total: <span id="res-time">00:00</span></p>
            </div>
            <br>
            <button class="btn" onclick="resetGame()">RECOMEÇAR</button>
        </div>
    </div>

    <script>
        // Banco de Dados de Perguntas (Exemplos representativos)
        const allQuestions = [
            // FÁCIL
            { q: "Quem venceu a Copa do Mundo de 2022?", options: ["França", "Argentina", "Brasil", "Alemanha"], correct: 1, level: "easy" },
            { q: "Qual o apelido da Seleção Brasileira?", options: ["Alviceleste", "Fúria", "Canarinho", "Laranja Mecânica"], correct: 2, level: "easy" },
            // ... Adicione as outras 28 perguntas seguindo este padrão ...
            // MÉDIO
            { q: "Qual time venceu a Champions League 2023?", options: ["Real Madrid", "Inter de Milão", "Man. City", "Liverpool"], correct: 2, level: "medium" },
            { q: "Quem é o maior artilheiro da história das Copas?", options: ["Pelé", "Ronaldo", "Klose", "Messi"], correct: 2, level: "medium" },
            // DIFÍCIL
            { q: "Em que ano o Chelsea ganhou sua primeira Champions?", options: ["2008", "2010", "2012", "2021"], correct: 2, level: "hard" },
            { q: "Qual destes países nunca venceu uma Copa?", options: ["Espanha", "Inglaterra", "Holanda", "França"], correct: 2, level: "hard" },
            // EXTREMO
            { q: "Quem foi o artilheiro da Copa de 1986?", options: ["Maradona", "Gary Lineker", "Careca", "Butragueño"], correct: 1, level: "extreme" },
            { q: "Qual clube revelou o craque Cristiano Ronaldo?", options: ["Sporting CP", "Benfica", "Man. United", "Porto"], correct: 0, level: "extreme" }
        ];

        // Lógica do Jogo
        let currentQuestionIndex = 0;
        let score = 0;
        let mistakes = 0;
        let timerInterval;
        let seconds = 0;
        let gameQuestions = [];

        function startGame() {
            seconds = 0;
            score = 0;
            mistakes = 0;
            currentQuestionIndex = 0;
            
            // Embaralha e prepara as 30 perguntas (separadas por nível)
            prepareQuestions();
            
            showScreen('game-screen');
            startTimer();
            loadQuestion();
        }

        function prepareQuestions() {
            // Em um cenário real, você teria 30+ perguntas aqui. 
            // O código abaixo organiza por dificuldade.
            const levels = ['easy', 'medium', 'hard', 'extreme'];
            gameQuestions = [];
            
            levels.forEach(lvl => {
                let filtered = allQuestions.filter(q => q.level === lvl);
                gameQuestions.push(...filtered.sort(() => Math.random() - 0.5));
            });
            
            // Garante que pegamos apenas as primeiras 30 se houver mais
            gameQuestions = gameQuestions.slice(0, 30);
        }

        function loadQuestion() {
            const q = gameQuestions[currentQuestionIndex];
            document.getElementById('question-number').innerText = `Pergunta: ${currentQuestionIndex + 1}/${gameQuestions.length}`;
            document.getElementById('question-text').innerText = q.q;
            
            const diffBadge = document.getElementById('difficulty');
            diffBadge.innerText = q.level;
            diffBadge.className = `difficulty-badge ${q.level}`;

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(choice) {
            if (choice === gameQuestions[currentQuestionIndex].correct) {
                score++;
            } else {
                mistakes++;
            }

            currentQuestionIndex++;
            if (currentQuestionIndex < gameQuestions.length) {
                loadQuestion();
            } else {
                finishGame();
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                let min = Math.floor(seconds / 60).toString().padStart(2, '0');
                let sec = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `Tempo: ${min}:${sec}`;
            }, 1000);
        }

        function finishGame() {
            clearInterval(timerInterval);
            showScreen('result-screen');
            document.getElementById('res-correct').innerText = score;
            document.getElementById('res-wrong').innerText = mistakes;
            document.getElementById('res-time').innerText = document.getElementById('timer').innerText.replace('Tempo: ', '');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function resetGame() {
            showScreen('start-screen');
        }
    </script>
</body>
</html>
