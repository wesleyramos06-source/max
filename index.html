<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Caos Total</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Fundo com tema de jogo de tiro */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0d0d0d; /* Preto profundo */
            color: #ffffff;
            font-family: 'Verdana', sans-serif;
            overflow: hidden;
        }

        /* Moldura do Painel */
        .painel {
            background: rgba(20, 20, 20, 0.95);
            padding: 50px 80px;
            border: 3px solid #ff3c00; /* Laranja Choque/Fogo */
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 60, 0, 0.4);
            position: relative;
        }

        /* Título Principal */
        h1 {
            font-size: 50px;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ff3c00;
            text-shadow: 2px 2px 10px rgba(255, 60, 0, 0.8);
        }

        /* Botão Play do Jarvis */
        .btn-play {
            background: #ff3c00;
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: 0.3s;
            box-shadow: 0 5px 0 #992400; /* Efeito 3D */
            margin: 0 auto;
        }

        .btn-play:hover {
            background: #ff5500;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(255, 60, 0, 0.5);
        }

        .btn-play:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #992400;
        }

        /* Animação do Controle Girando 360 */
        .controle-girando {
            font-size: 35px;
            display: inline-block;
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="painel">
        <h1>Central de Caos Total</h1>
        
        <button class="btn-play" onclick="jarvisInit()">
            <i class="fas fa-gamepad controle-girando"></i>
            PLAY
        </button>
    </div>

    <script>
        function jarvisInit() {
            // Feedback visual e sonoro do Jarvis (via log)
            console.log("Jarvis: Iniciando protocolos de combate...");
            console.log("Jarvis: Abrindo novo setor de operações.");

            // Comando para abrir a nova aba
            // Nota: se o navegador bloquear, clique no ícone de aviso na barra de endereços
            window.open('about:blank', '_blank');
        }
    </script>

</body>
</html>
