<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora do Jogo</title>
    <style>
        /* Estilização Geral */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0, 110, 255, 0.3);
        }

        /* Controle de Videogame Girando */
        .icon-container {
            font-size: 80px;
            margin-bottom: 40px;
            display: inline-block;
            animation: spin 4s linear infinite;
            filter: drop-shadow(0 0 15px #00d2ff);
        }

        @keyframes spin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        /* Botão Estilizado */
        .play-button {
            display: inline-block;
            text-decoration: none;
            color: white;
            background: linear-gradient(45deg, #3a7bd5, #00d2ff);
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
        }

        .play-button:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.6);
            letter-spacing: 2px;
        }

        /* Enfeites Flutuantes */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>HORA DO JOGO</h1>

        <div class="icon-container">
            🎮
        </div>

        <br>

        <a href="https://nite.games/#google_vignette" target="_blank" class="play-button">
            ACESSAR PLATAFORMA
        </a>
    </div>

</body>
</html>
