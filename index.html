<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Play - Jogos Instantâneos</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        /* Grid de Jogos Otimizado */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 15px;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 15px var(--accent);
            border-color: var(--accent);
        }

        .game-thumb {
            width: 100%;
            height: 150px;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .game-title {
            margin-top: 12px;
            font-weight: 600;
            font-size: 1rem;
        }

        /* Modal do Jogo (Onde o jogo abre) */
        #game-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
        }

        .modal-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
        }

        #game-frame {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
        }

        .close-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>Infinity Play</h1>
    <p>Jogue agora, sem downloads.</p>
</header>

<div class="game-grid" id="grid">
    </div>

<div id="game-modal">
    <div class="modal-header">
        <span id="current-game-title">Carregando...</span>
        <button class="close-btn" onclick="closeGame()">FECHAR JOGO</button>
    </div>
    <iframe id="game-frame" src=""></iframe>
</div>

<script>
    const games = [
        { name: "Subway Surfers", url: "https://games.poki.com/458768/subway-surfers" },
        { name: "Minecraft (Classic)", url: "https://classic.minecraft.net" },
        { name: "Slither.io", url: "https://slither.io" },
        { name: "Crossy Road", url: "https://poki.com/pt/g/crossy-road" },
        { name: "Temple Run 2", url: "https://poki.com/pt/g/temple-run-2" },
        { name: "Stickman Hook", url: "https://poki.com/pt/g/stickman-hook" },
        { name: "2048", url: "https://play2048.co" },
        { name: "Shell Shockers", url: "https://shellshock.io" },
        { name: "Moto X3M", url: "https://poki.com/pt/g/moto-x3m" },
        { name: "Vectaria.io", url: "https://vectaria.io" },
        { name: "EvoWorld.io", url: "https://evoworld.io" },
        { name: "Tunnel Rush", url: "https://poki.com/pt/g/tunnel-rush" },
        { name: "Little Alchemy", url: "https://littlealchemy.com" }
    ];

    const grid = document.getElementById('grid');
    const modal = document.getElementById('game-modal');
    const frame = document.getElementById('game-frame');
    const title = document.getElementById('current-game-title');

    // Gerar os cards dinamicamente
    games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
            <div class="game-thumb" style="background: linear-gradient(45deg, #1e293b, #38bdf8)">
                ${game.name[0]}
            </div>
            <div class="game-title">${game.name}</div>
        `;
        card.onclick = () => openGame(game.name, game.url);
        grid.appendChild(card);
    });

    function openGame(name, url) {
        title.innerText = name;
        frame.src = url;
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Trava o scroll da página
    }

    function closeGame() {
        modal.style.display = 'none';
        frame.src = ""; // Para o som do jogo ao fechar
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
