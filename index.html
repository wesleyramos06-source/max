<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Quest 3D</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-back: #1e293b;
            --card-front: #38bdf8;
            --accent: #f43f5e;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            perspective: 1000px; /* Necess├бrio para o efeito 3D global */
        }

        h1 { margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        /* Container do Jogo */
        .memory-game {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-gap: 15px;
            transform-style: preserve-3d;
        }

        /* Estrutura da Carta */
        .card {
            width: 100px;
            height: 140px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card:active {
            transform: scale(0.95);
            transition: transform 0.2s;
        }

        /* Estado de Virada */
        .card.flip {
            transform: rotateY(180deg);
        }

        /* Faces da Carta */
        .front-face, .back-face {
            width: 100%;
            height: 100%;
            padding: 10px;
            position: absolute;
            border-radius: 8px;
            backface-visibility: hidden; /* Esconde a face oposta */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        .front-face {
            background: var(--card-front);
            transform: rotateY(180deg);
            border: 4px solid #fff;
        }

        .back-face {
            background: var(--card-back);
            background-image: radial-gradient(circle, #334155 1px, transparent 1px);
            background-size: 10px 10px;
            border: 4px solid #475569;
        }

        /* Feedback visual para acerto */
        .card.match {
            cursor: default;
            filter: brightness(0.8);
        }

    </style>
</head>
<body>

    <h1>Memory 3D</h1>

    <section class="memory-game" id="game-board">
        </section>

    <script>
        const board = document.getElementById('game-board');
        const emojis = ['ЁЯЪА', 'ЁЯЪА', 'ЁЯТО', 'ЁЯТО', 'ЁЯС╗', 'ЁЯС╗', 'ЁЯФе', 'ЁЯФе', 'тнР', 'тнР', 'ЁЯНА', 'ЁЯНА', 'ЁЯНО', 'ЁЯНО', 'тЪб', 'тЪб'];
        
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;

        function createBoard() {
            // Embaralha os emojis (Fisher-Yates)
            emojis.sort(() => Math.random() - 0.5);

            emojis.forEach(emoji => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.framework = emoji;

                card.innerHTML = `
                    <div class="front-face">${emoji}</div>
                    <div class="back-face">?</div>
                `;

                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.framework === secondCard.dataset.framework;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.classList.add('match');
            secondCard.classList.add('match');
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        createBoard();
    </script>
</body>
</html>
