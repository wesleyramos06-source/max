<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Jogo de Tiro 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            top: 10px; left: 10px;
            color: white; background: rgba(0,0,0,0.5);
            padding: 10px;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="instructions">Clique na tela para jogar | Movimento: Mouse | Atirar: Clique</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- Configuração Básica ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Céu azul

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Iluminação ---
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
        scene.add(light);

        // --- Chão ---
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- Alvos (Cubos) ---
        const targets = [];
        function createTarget() {
            const geo = new THREE.BoxGeometry(2, 2, 2);
            const mat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            const cube = new THREE.Mesh(geo, mat);
            cube.position.set(Math.random() * 40 - 20, 1, Math.random() * -40 - 5);
            scene.add(cube);
            targets.push(cube);
        }
        for(let i=0; i<10; i++) createTarget();

        // --- Controles (FPS Style) ---
        const controls = new PointerLockControls(camera, document.body);
        document.addEventListener('click', () => controls.lock());

        // --- Sistema de Tiro
