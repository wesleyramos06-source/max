<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutMaster Quiz | Hardcore Edition</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --accent: #10b981;
            --danger: #ef4444;
            --gold: #f59e0b;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            position: relative;
        }

        .level-badge {
            position: absolute;
            top: -15px;
            right: 20px;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .lvl-facil { background: var(--accent); }
        .lvl-medio { background: var(--primary); }
        .lvl-dificil { background: var(--gold); }
        .lvl-extremo { background: var(--danger); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.4s ease;
        }

        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; background: linear-gradient(to right, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            font-size: 1rem;
            margin-top: 10px;
        }

        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .option {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            margin: 8px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option:hover { background: rgba(59, 130, 246, 0.2); border-color: var(--primary); }

        #results-list {
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
            margin-top: 20px;
            padding-right: 10px;
        }

        .res-item {
            padding: 10px;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            font-size: 0.9rem;
        }

        .correct { color: var(--accent); }
        .wrong { color: var(--danger); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container" id="quiz-app">
        <div id="start-screen">
            <h1>FutMaster</h1>
            <p>30 Perguntas • 4 Níveis • 1 Só Campeão</p>
            <button class="btn" onclick="startQuiz()">INICIAR DESAFIO</button>
        </div>

        <div id="game-screen" class="hidden">
            <div id="difficulty-tag" class="level-badge lvl-facil">Fácil</div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <p id="timer" style="font-family: monospace; color: var(--gold);">Tempo: 00:00</p>
            <h3 id="question-text">Carregando pergunta...</h3>
            <div id="options-box"></div>
        </div>

        <div id="end-screen" class="hidden">
            <h2>Fim da Partida!</h2>
            <div id="final-stats"></div>
            <hr style="opacity: 0.1; margin: 20px 0;">
            <div id="results-list"></div>
            <button class="btn" onclick="location.reload()" style="background: var(--accent);">JOGAR NOVAMENTE</button>
        </div>
    </div>
