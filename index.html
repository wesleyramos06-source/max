<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo de Carro</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #87CEEB;
    }
    #gameArea {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: url('https://i.imgur.com/2R9zQ0K.png') repeat; /* textura de estrada */
    }
    #car {
      width: 50px;
      height: 100px;
      background: red;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>
  <div id="gameArea">
    <div id="car"></div>
  </div>

  <script>
    const car = document.getElementById("car");
    let x = window.innerWidth / 2;
    let y = window.innerHeight / 2;
    const speed = 10;

    document.addEventListener("keydown", (e) => {
      switch(e.key) {
        case "ArrowUp": y -= speed; break;
        case "ArrowDown": y += speed; break;
        case "ArrowLeft": x -= speed; break;
        case "ArrowRight": x += speed; break;
      }
      car.style.left = x + "px";
      car.style.top = y + "px";
    });
  </script>
</body>
</html>
