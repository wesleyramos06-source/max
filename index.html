<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futebol Eletrônico</title>
    <style>
        :root {
            --gramado: #2e7d32;
            --linha: #ffffff;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* Menu Inicial */
        #menu {
            text-align: center;
            color: white;
            z-index: 10;
        }

        .btn-partida {
            padding: 20px 40px;
            font-size: 24px;
            background-color: #fdd835;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-partida:hover {
            transform: scale(1.1);
            background-color: #fbc02d;
        }

        /* Campo de Jogo */
        #campo {
            display: none;
            position: relative;
            width: 600px;
            height: 400px;
            background-color: var(--gramado);
            border: 5px solid var(--linha);
            overflow: hidden;
        }

        /* Área do Gol */
        .trave {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 100px;
            border: 5px solid var(--linha);
            border-top: none;
        }

        /* A Bola */
        #bola {
            position: absolute;
            bottom: 50px;
            left: 50%;
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            transition: all 0.5s ease-out;
            box-shadow: 0 4px 5px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
        }

        .mensagem {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 40px;
            display: none;
            text-shadow: 2px 2px 5px black;
        }
    </style>
</head>
<body>

    <div id="menu">
        <h1>PRO FOOTBALL 2026</h1>
        <button class="btn-partida" onclick="iniciarJogo()">PARTIDA RÁPIDA</button>
    </div>

    <div id="campo">
        <div class="trave"></div>
        <div id="bola" onclick="chutar()">⚽</div>
        <div id="placar" style="color: white; padding: 10px;">Gols: <span id="gols">0</span></div>
        <div id="feedback" class="mensagem">GOOOOL!</div>
    </div>

    <script>
        let gols = 0;

        function iniciarJogo() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('campo').style.display = 'block';
        }

        function chutar() {
            const bola = document.getElementById('bola');
            const feedback = document.getElementById('feedback');
            
            // Lógica simples de chute aleatório
            const sorte = Math.random();
            const miraHorizontal = (Math.random() * 200) - 100; // Move para esquerda ou direita

            bola.style.bottom = "320px";
            bola.style.left = `calc(50% + ${miraHorizontal}px)`;

            setTimeout(() => {
                if (Math.abs(miraHorizontal) < 120) { // Dentro da área da trave
                    feedback.innerText = "GOOOOL!";
                    feedback.style.display = "block";
                    gols++;
                    document.getElementById('gols').innerText = gols;
                } else {
                    feedback.innerText = "PARA FORA!";
                    feedback.style.display = "block";
                }

                // Resetar bola
                setTimeout(() => {
                    bola.style.bottom = "50px";
                    bola.style.left = "50%";
                    feedback.style.display = "none";
                }, 1500);
            }, 500);
        }
    </script>
</body>
</html>
   <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Penalty 2026</title>
    <style>
        /* Estilização Geral */
        :root {
            --verde-campo: #388e3c;
            --gramado-escuro: #2e7d32;
            --ouro: #fdd835;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Menu Principal */
        #menu-inicial {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 50px;
            border-radius: 20px;
            border: 3px solid var(--ouro);
            box-shadow: 0 0 30px rgba(253, 216, 53, 0.2);
        }

        h1 { font-size: 3rem; margin-bottom: 30px; text-shadow: 2px 2px #000; }

        .btn {
            background: var(--ouro);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.1);
            background: #fff;
            box-shadow: 0 0 20px var(--ouro);
        }

        /* Campo de Jogo */
        #estadio {
            display: none;
            width: 800px;
            height: 500px;
            background: var(--verde-campo);
            position: relative;
            border: 10px solid #fff;
            border-radius: 10px;
            background-image: repeating-linear-gradient(90deg, var(--verde-campo), var(--verde-campo) 50px, var(--gramado-escuro) 50px, var(--gramado-escuro) 100px);
        }

        /* Trave e Goleiro */
        .gol {
            width: 400px;
            height: 180px;
            border: 8px solid white;
            border-top: none;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 0;
            background: rgba(255, 255, 255, 0.1);
        }

        #goleiro {
            width: 60px;
            height: 80px;
            background: #f44336;
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 10px 10px 0 0;
            transition: left 0.2s ease-in-out;
            display: flex;
            justify-content: center;
            font-size: 40px;
        }

        /* Bola */
        #bola {
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            cursor: crosshair;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        /* Placar */
        .placar {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .aviso {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            font-weight: bold;
            display: none;
            z-index: 10;
            text-shadow: 3px 3px #000;
        }
    </style>
</head>
<body>

    <div id="menu-inicial">
        <h1>FOOTBALL ELITE</h1>
        <button class="btn" onclick="iniciarJogo()">⚽ Partida Rápida</button>
    </div>

    <div id="estadio">
        <div class="placar">Gols: <span id="score">0</span></div>
        <div class="gol"></div>
        <div id="goleiro">🧤</div>
        <div id="bola" onclick="chutar(event)">⚽</div>
        <div id="feedback" class="aviso"></div>
    </div>

    <script>
        let score = 0;
        let jogoAtivo = true;
        const goleiro = document.getElementById('goleiro');
        const bola = document.getElementById('bola');
        const feedback = document.getElementById('feedback');

        // Faz o goleiro se mover sozinho
        setInterval(() => {
            if(jogoAtivo) {
                const positions = ['35%', '50%', '65%'];
                const randomPos = positions[Math.floor(Math.random() * positions.length)];
                goleiro.style.left = randomPos;
            }
        }, 600);

        function iniciarJogo() {
            document.getElementById('menu-inicial').style.display = 'none';
            document.getElementById('estadio').style.display = 'block';
        }

        function chutar(event) {
            if(!jogoAtivo) return;
            jogoAtivo = false;

            // Define direção aleatória do chute (Esquerda, Centro ou Direita)
            const direcoes = [-120, 0, 120];
            const chuteX = direcoes[Math.floor(Math.random() * direcoes.length)];
            
            // Animação da bola subindo
            bola.style.bottom = "350px";
            bola.style.left = `calc(50% + ${chuteX}px)`;
            bola.style.transform = "translateX(-50%) scale(0.7) rotate(360deg)";

            setTimeout(() => {
                validarLance(chuteX);
            }, 600);
        }

        function validarLance(chuteX) {
            const goleiroPos = goleiro.offsetLeft + (goleiro.offsetWidth / 2);
            const estadioCentro = document.getElementById('estadio').offsetWidth / 2;
            const bolaPosFinal = estadioCentro + chuteX;

            // Verifica se o goleiro está na mesma posição da bola
            const defesa = Math.abs(bolaPosFinal - goleiroPos) < 50;

            if (defesa) {
                feedback.innerText = "DEFENDEU! 🧤";
                feedback.style.color = "#ffeb3b";
            } else {
                feedback.innerText = "GOOOOL! ⚽";
                feedback.style.color = "#4caf50";
                score++;
                document.getElementById('score').innerText = score;
            }

            feedback.style.display = "block";

            // Resetar para o próximo chute
            setTimeout(() => {
                feedback.style.display = "none";
                bola.style.bottom = "60px";
                bola.style.left = "50%";
                bola.style.transform = "translateX(-50%) scale(1) rotate(0deg)";
                jogoAtivo = true;
            }, 1500);
        }
    </script>
</body>
</html>
