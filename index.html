<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Arcade - Ping Pong</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #38bdf8;
            --white: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--white);
            overflow: hidden;
        }

        /* Botão de Início */
        #start-button {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--white);
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #start-button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
        }

        #start-button:active {
            transform: scale(0.95);
        }

        /* Container do Jogo */
        #game-container {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            border: 4px solid var(--primary);
            border-radius: 8px;
            background-color: #000;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            cursor: none; /* Esconde o mouse no jogo */
        }

        .instructions {
            margin-top: 20px;
            color: #94a3b8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <button id="start-button">Jogar Ping Pong</button>

        <div class="instructions">Mova o mouse para controlar sua palheta</div>
    </div>
