<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate FutQuiz - Infinite Edition</title>
    <style>
        /* CSS - DESIGN DO ESTÁDIO E INTERFACE */
        :root {
            --soccer-green: #2ecc71;
            --dark-green: #27ae60;
            --white: #ffffff;
            --black: #1a1a1a;
            --stadium-shadow: rgba(0, 0, 0, 0.75);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: linear-gradient(var(--stadium-shadow), var(--stadium-shadow)), 
                        url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--white);
            overflow: hidden;
        }

        #game-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 3px solid var(--soccer-green);
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            position: relative;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--soccer-green); text-transform: uppercase; letter-spacing: 2px; }
        
        .hidden { display: none !important; }

        /* Botões */
        .btn-action {
            background: var(--soccer-green);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 100%;
            margin-top: 20px;
        }

        .btn-action:hover { background: var(--dark-green); transform: translateY(-3px); }

        .option-btn {
            background: rgba(255, 255, 255, 0.9);
            color: var(--black);
            border: 2px solid transparent;
            padding: 12px;
            margin: 8px 0;
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .option-btn:hover { background: var(--white); border-color: var(--soccer-green); transform: scale(1.02); }

        /* Stats */
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; font-size: 0.9rem; color: #ccc; }
        .score-val { color: var(--soccer-green); font-size: 1.2rem; }

        .difficulty-badge {
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        .diff-easy { background: #2ecc71; }
        .diff-medium { background: #f1c40f; color: #000; }
        .diff-hard { background: #e67e22; }
        .diff-expert { background: #e74c3c; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #question-text { font-size: 1.3rem; margin-bottom: 25px; min-height: 80px; display: flex; align-items: center; justify-content: center; }

        #game-over-screen h2 { color: #e74c3c; margin-bottom: 20px; }
        .final-info { margin: 10px 0; font-size: 1.1rem; }
        .record-tag { color: #f1c40f; font-weight: bold; font-size: 1.4rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="game-card">
        <div id="start-screen">
            <h1>FutQuiz ⚽</h1>
            <p>O desafio infinito de futebol.</p>
            <p style="font-size: 0.8rem; margin-top: 10px; color: #aaa;">Se errar uma, volta ao início!</p>
            <button class="btn-action" onclick="startGame()">Iniciar Partida</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="stats-bar">
                <div>SCORE: <span id="current-score" class="score-val">0</span></div>
                <div id="difficulty-label" class="difficulty-badge diff-easy">Fácil</div>
            </div>
            <div id="question-text">Pergunta...</div>
            <div id="options-container"></div>
        </div>

        <div id="game-over-screen" class="hidden">
            <h2>FIM DE JOGO! 🚩</h2>
            <div class="final-info" id="final-score-text">Pontuação: 0</div>
            <div class="final-info" id="final-time-text">Tempo: 0s</div>
            <div class="record-tag">RECORDE: <span id="high-score-val">0</span></div>
            <button class="btn-action" onclick="startGame()">Tentar Novamente</button>
        </div>
    </div>
