    <style>
        /* Configurações de Fundo e Layout */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            /* Imagem de fundo com jogadores midiáticos (Estilo Colagem) */
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), 
                              url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=2093&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Arial Black', Gadget, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }

        h1 {
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px #00ff88;
            text-align: center;
        }

        /* Grid de Botões */
        .grid-campeonatos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
        }

        /* Estilo dos Botões */
        .btn-liga {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.4s ease;
            text-align: center;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }

        /* Efeito de Hover (Passar o mouse) */
        .btn-liga:hover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.3);
        }

        /* Cores específicas para dar um toque "Premium" */
        .btn-liga::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 5px;
            background: #00ff88;
            opacity: 0;
            transition: 0.3s;
        }

        .btn-liga:hover::before {
            opacity: 1;
        }

        /* Responsividade para celulares */
        @media (max-width: 600px) {
            .grid-campeonatos {
                grid-template-columns: 1fr 1fr;
            }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>

        <a href="https://ge.globo.com/futebol/futebol-internacional/futebol-frances/" target="_blank" class="btn-liga">FRANCÊS</a>
        
        <a href="https://ge.globo.com/futebol/futebol-internacional/futebol-argentino/" target="_blank" class="btn-liga">ARGENTINO</a>
        
        <a href="https://ge.globo.com/futebol/futebol-internacional/futebol-saudita/" target="_blank" class="btn-liga">ÁRABE</a>
    </div>

</body>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Futebol Pro</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --secondary-color: #1b5e20;
            --accent-color: #ffd700;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #quiz-container {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 500px;
            text-align: center;
            border-top: 5px solid var(--primary-color);
        }

        h1 { color: var(--accent-color); }

        .hidden { display: none; }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin: 10px 0;
            width: 100%;
        }

        .btn:hover {
            background-color: var(--secondary-color);
            transform: scale(1.02);
        }

        .options-container {
            display: grid;
            gap: 10px;
            margin-top: 20px;
        }

        .option-btn {
            background: #333;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
        }

        .option-btn:hover { background: #444; }

        #result-screen {
            text-align: left;
        }

        .correct { color: #4caf50; font-weight: bold; }
        .wrong { color: #f44336; font-weight: bold; }
        
        .stat-box {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-color);
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <div id="start-screen">
            <h1>🏆 Futebol Quiz</h1>
            <p>Teste seus conhecimentos sobre o mundo da bola!</p>
            <button class="btn" onclick="startQuiz()">Começar Quiz (12 Perguntas)</button>
        </div>

        <div id="question-screen" class="hidden">
            <h3 id="question-number">Pergunta 1/12</h3>
            <p id="question-text" style="font-size: 1.2rem; margin-bottom: 20px;"></p>
            <div id="options" class="options-container"></div>
        </div>

        <div id="result-screen" class="hidden">
            <h2>Fim de Jogo!</h2>
            <div class="stat-box">
                <p id="final-score"></p>
            </div>
            <div id="summary"></div>
            <button class="btn" onclick="location.reload()">Tentar Novamente</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Quem tem mais Bolas de Ouro?", o: ["Cristiano Ronaldo", "Lionel Messi", "Pelé", "Ronaldinho"], a: 1 },
            { q: "Qual seleção venceu a Copa de 2014?", o: ["Brasil", "Argentina", "Alemanha", "França"], a: 2 },
            { q: "Onde foi disputada a Copa de 2022?", o: ["Rússia", "Catar", "EUA", "Japão"], a: 1 },
            { q: "Qual clube é conhecido como 'Merengues'?", o: ["Barcelona", "Real Madrid", "Milan", "Porto"], a: 1 },
            { q: "Quem marcou o gol do título do Brasil em 2002 na final?", o: ["Ronaldo Fenômeno", "Rivaldo", "Ronaldinho", "Cafu"], a: 0 },
            { q: "Qual jogador é o maior artilheiro da história das Copas?", o: ["Pelé", "Klose", "Ronaldo", "Mbappé"], a: 1 },
            { q: "Em que ano o Brasil ganhou sua primeira Copa?", o: ["1950", "1962", "1958", "1970"], a: 2 },
            { q: "Qual desses times nunca caiu para a Série B (até 2023)?", o: ["Santos", "Flamengo", "Palmeiras", "Vasco"], a: 1 },
            { q: "Quem é o 'Rei do Futebol'?", o: ["Zico", "Maradona", "Pelé", "Neymar"], a: 2 },
            { q: "Qual estádio é a casa do Barcelona?", o: ["Santiago Bernabéu", "Camp Nou", "Wanda Metropolitano", "San Siro"], a: 1 },
            { q: "Quem venceu a Champions League 2022/23?", o: ["Real Madrid", "Inter de Milão", "Manchester City", "Liverpool"], a: 2 },
            { q: "Qual jogador é conhecido como 'CR7'?", o: ["Cristiano Ronaldo", "Ronaldo Nazário", "Ronaldinho", "Cristian"], a: 0 }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let userAnswers = [];

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('question-number').innerText = `Pergunta ${currentQuestionIndex + 1}/12`;
            document.getElementById('question-text').innerText = q.q;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.o.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.classList.add('option-btn');
                button.onclick = () => selectAnswer(index);
                optionsDiv.appendChild(button);
            });
        }

        function selectAnswer(index) {
            const correct = questions[currentQuestionIndex].a;
            userAnswers.push({
                question: questions[currentQuestionIndex].q,
                selected: questions[currentQuestionIndex].o[index],
                correct: questions[currentQuestionIndex].o[correct],
                isRight: index === correct
            });

            if (index === correct) score++;

            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            document.getElementById('final-score').innerText = `Você acertou ${score} de 12 perguntas!`;
            
            const summaryDiv = document.getElementById('summary');
            userAnswers.forEach((item, i) => {
                const p = document.createElement('p');
                p.innerHTML = `<strong>${i+1}.</strong> ${item.isRight ? '<span class="correct">✓</span>' : '<span class="wrong">✗</span>'} ${item.question}<br>
                <small>Sua resposta: ${item.selected} | Correta: ${item.correct}</small>`;
                summaryDiv.appendChild(p);
            });
        }
    </script>
</body>
</html>
