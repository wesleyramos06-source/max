<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Hyper Drive Pro - Gold Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a12; font-family: 'Orbitron', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; 
            color: #00ffcc; background: rgba(0, 0, 0, 0.6);
            padding: 15px; border-radius: 10px; border: 1px solid #00ffcc;
            backdrop-filter: blur(5px); pointer-events: none;
        }
        .speed { font-size: 2.2rem; font-weight: 800; font-style: italic; color: #fff; text-shadow: 0 0 15px #00ffcc; }
        #instructions {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: #00ffcc; font-size: 0.8rem; letter-spacing: 3px; 
            text-transform: uppercase; text-shadow: 0 0 5px #000;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="ui">
        <div class="speed"><span id="kmh">0</span> <span style="font-size: 1rem;">KM/H</span></div>
        <div style="font-size: 0.7rem; opacity: 0.9; margin-top: 5px;">DISTÂNCIA: <span id="dist">0</span>m</div>
    </div>

    <div id="instructions">WASD para Pilotar • ESPAÇO para Drift</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- AMBIENTE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050508);
        scene.fog = new THREE.FogExp2(0x050508, 0.012);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping; // Melhora o contraste das cores
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        // --- LUZES ---
        const hemiLight = new THREE.HemisphereLight(0x00ffcc, 0xaa00ff, 0.6);
        scene.add(hemiLight);

        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 7);
        scene.add(sun);

        // --- CARRO (DESIGN MELHORADO) ---
        const carGroup = new THREE.Group();
        
        // Chassi com reflexo
        const bodyMat = new THREE.MeshStandardMaterial({ 
            color: 0x080808, metalness: 1, roughness: 0.2,
            emissive: 0x00ffcc, emissiveIntensity: 0.02
        });
        const carBody = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.4, 2.8), bodyMat);
        carGroup.add(carBody);

        // Vidro fumê
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x000000, metalness: 1, roughness: 0 });
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.45, 1.4), glassMat);
        cabin.position.set(0, 0.35, -0.2);
        carGroup.add(cabin);

        // Faróis com "Bloom" (Emissive)
        const lightGeom = new THREE.BoxGeometry(0.4, 0.1, 0.1);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x00ffff, emissiveIntensity: 5 });
        const hL = new THREE.Mesh(lightGeom, headMat); hL.position.set(-0.4, 0, 1.4);
        const hR = hL.clone(); hR.position.x = 0.4;
        carGroup.add(hL, hR);

        // Rodas (Aros Neon)
        const wheels = [];
        const wheelGeom = new THREE.CylinderGeometry(0.38, 0.38, 0.25, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const rimMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 2 });
        
        [[-0.75, -0.1, 0.9], [0.75, -0.1, 0.9], [-0.75, -0.1, -0.9], [0.75, -0.1, -0.9]].forEach(pos => {
            const w = new THREE.Mesh(wheelGeom, wheelMat);
            w.rotation.z = Math.PI / 2;
            w.position.set(...pos);
            // Aro neon lateral
            const rim = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.05, 8, 24), rimMat);
            rim.rotation.y = Math.PI / 2;
            w.add(rim);
            carGroup.add(w);
            wheels.push(w);
        });

        scene.add(carGroup);

        // --- CHÃO E GRID ---
        const grid = new THREE.GridHelper(2000, 80, 0x00ffcc, 0x151525);
        scene.add(grid);
