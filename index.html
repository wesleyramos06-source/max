<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Open World Car - Mini Demo</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
        }
        .speed { font-size: 24px; font-weight: bold; color: #00ffcc; }
    </style>
</head>
<body>

    <div id="ui">
        <div>USE AS SETAS OU WASD</div>
        <div class="speed">Velocidade: <span id="kmh">0</span> km/h</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }

    <script type="module">
        import * as THREE from 'three';

        // --- Configuração da Cena ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // Noite urbana
        scene.fog = new THREE.Fog(0x111122, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Luzes ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0x00ffcc, 1);
        sunLight.position.set(5, 10, 7);
        scene.add(sunLight);

        // --- O Carro (Simples) ---
        const carGroup = new THREE.Group();
        
        // Corpo do carro
        const bodyGeom = new THREE.BoxGeometry(1, 0.5, 2);
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0xff0055 });
        const carBody = new THREE.Mesh(bodyGeom, bodyMat);
        carGroup.add(carBody);

        // Cabine
        const cabinGeom = new THREE.BoxGeometry(0.8, 0.4, 0.8);
        const cabinMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const cabin = new THREE.Mesh(cabinGeom, cabinMat);
        cabin.position.y = 0.4;
        cabin.position.z = -0.2;
        carGroup.add(cabin);

        scene.add(carGroup);

        // --- Chão (Mundo Aberto Infinito) ---
        const grid = new THREE.GridHelper(1000, 100, 0x00ffcc, 0x444444);
        scene.add(grid);
