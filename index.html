<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinuca Pro - HTML5</title>
    <style>
        body {
            margin: 0;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }

        #game-ui {
            margin-bottom: 10px;
            text-align: center;
        }

        /* Estilização da Mesa (Bordas de madeira) */
        #table-container {
            padding: 20px;
            background: #5d391b; /* Cor de madeira */
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        canvas {
            background-color: #27ae60; /* Verde do pano */
            border: 5px solid #1e8449;
            cursor: crosshair;
            display: block;
        }

        .controls {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <h1>SINUCA 8-BALL</h1>
        <p>Bolas encaçapadas: <span id="score">0</span></p>
    </div>

    <div id="table-container">
        <canvas id="poolTable" width="800" height="400"></canvas>
    </div>

    <div class="controls">
        Arraste a bola branca para trás e solte para disparar!
    </div>

    <script>
        const canvas = document.getElementById('poolTable');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        let score = 0;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let mousePos = { x: 0, y: 0 };

        const friction = 0.985; // Simula a resistência do pano
        const ballRadius = 12;

        class Ball {
            constructor(x, y, color, isWhite = false) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.color = color;
                this.isWhite = isWhite;
                this.inPocket = false;
            }

            draw() {
                if (this.inPocket) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, ballRadius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                
                // Brilho da bola
                ctx.beginPath();
                ctx.arc(this.x - 3, this.y - 3, 3, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255,255,255,0.3)";
                ctx.fill();
                ctx.closePath();
            }

            update() {
                if (this.inPocket) return;

                this.x += this.vx;
                this.y += this.vy;

                // Atrito
                this.vx *= friction;
                this.vy *= friction;

                if (Math.abs(this.vx) < 0.1) this.vx = 0;
                if (Math.abs(this.vy) < 0.1) this.vy = 0;

                // Colisão com as bordas
                if (this.x + ballRadius > canvas.width || this.x - ballRadius < 0) {
                    this.vx *= -1;
                }
                if (this.y + ballRadius > canvas.height || this.y - ballRadius < 0) {
                    this.vy *= -1;
                }

                // Verificar Caçapas (Pockets)
                checkPocket(this);
            }
        }

        let balls = [];
        let whiteBall;

        function initGame() {
            balls = [];
            // Criar bola branca
            whiteBall = new Ball(200, 200, "white", true);
            balls.push(whiteBall);

            // Criar triângulo de bolas coloridas
            const startX = 550;
            const startY = 200;
            const colors = ["#f1c40f", "#e67e22", "#e74c3c", "#9b59b6", "#2980b9", "#34495e", "#d35400"];
            
            let count = 0;
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col <= row; col++) {
                    let color = colors[count % colors.length];
                    balls.push(new Ball(startX + (row * 22), (startY - (row * 12)) + (col * 25), color));
                    count++;
                }
            }
        }

        function checkPocket(ball) {
            const pockets = [
                {x: 0, y: 0}, {x: 400, y: 0}, {x: 800, y: 0},
                {x: 0, y: 400}, {x: 400, y: 400}, {x: 800, y: 400}
            ];

            pockets.forEach(p => {
                const dist = Math.hypot(ball.x - p.x, ball.y - p.y);
                if (dist < 25) {
                    if (ball.isWhite) {
                        // Se a branca cair, volta pro início
                        ball.x = 200; ball.y = 200;
                        ball.vx = 0; ball.vy = 0;
                    } else {
                        ball.inPocket = true;
                        score++;
                        scoreEl.innerText = score;
                    }
                }
            });
        }
