<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino 3D - Retro Runner</title>
    <style>
        :root {
            --bg-color: #050505;
            --primary: #00ffcc;
            --secondary: #ff00ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* --- Tela Inicial --- */
        #home-screen {
            position: absolute;
            z-index: 100;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid var(--primary);
            border-radius: 15px;
            box-shadow: 0 0 20px var(--primary);
        }

        h1 { font-size: 3rem; margin-bottom: 10px; color: var(--primary); text-shadow: 2px 2px var(--secondary); }
        p { margin-bottom: 20px; opacity: 0.8; }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 30px var(--primary);
        }

        /* --- HUD (Interface) --- */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            font-family: monospace;
            font-size: 1.2rem;
            display: none;
        }

        .stat { color: var(--primary); margin-bottom: 5px; }

        /* --- Mundo 3D --- */
        #game-container {
            width: 100vw;
            height: 100vh;
            perspective: 800px; /* Profundidade */
            display: none;
            overflow: hidden;
        }

        #world {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        /* Chão */
        #floor {
            position: absolute;
            width: 200%;
            height: 2000px;
            background: 
                linear-gradient(transparent 0%, var(--secondary) 1%),
                linear-gradient(90deg, transparent 0%, var(--secondary) 1%);
            background-size: 100px 100px;
            left: -50%;
            bottom: 0;
            transform: rotateX(75deg);
            transform-origin: bottom;
            animation: moveFloor 2s linear infinite;
        }

        @keyframes moveFloor {
            from { background-position: 0 0; }
            to { background-position: 0 100px; }
        }

        /* Personagem */
        #dino {
            position: absolute;
            bottom: 150px;
            left: 50%;
            width: 40px;
            height: 60px;
            background: var(--primary);
            transform: translateX(-50%) translateZ(0);
            transform-style: preserve-3d;
            transition: transform 0.1s, height 0.1s;
            box-shadow: 0 0 15px var(--primary);
        }

        /* Obstáculos */
        .obstacle {
            position: absolute;
            width: 40px;
            height: 40px;
            background: red;
            left: 50%;
            bottom: 150px;
            transform: translateX(-50%);
            box-shadow: 0 0 15px red;
        }

        /* Estados do Personagem */
        .jumping { transform: translateX(-50%) translateY(-120px) !important; }
        .ducking { height: 30px !important; bottom: 150px !important; }

    </style>
</head>
<body>

    <div id="home-screen">
        <h1>DINO 3D</h1>
        <p>Use <b>W</b> para pular e <b>S</b> para agachar.</p>
        <button onclick="startGame()">Iniciar Jogo</button>
    </div>

    <div id="hud">
        <div class="stat">Tempo: <span id="time-val">0</span>s</div>
        <div class="stat">Distância: <span id="dist-val">0</span>m</div>
    </div>

    <div id="game-container">
        <div id="world">
            <div id="floor"></div>
            <div id="dino"></div>
        </div>
    </div>

    <script>
        const dino = document.getElementById('dino');
        const homeScreen = document.getElementById('home-screen');
        const gameContainer = document.getElementById('game-container');
        const hud = document.getElementById('hud');
        const timeVal = document.getElementById('time-val');
        const distVal = document.getElementById('dist-val');
        const world = document.getElementById('world');

        let isJumping = false;
        let isDucking = false;
        let gameActive = false;
        let distance = 0;
        let startTime = 0;
        let obstacles = [];
        let gameSpeed = 5;

        function startGame() {
            homeScreen.style.display = 'none';
            gameContainer.style.display = 'block';
            hud.style.display = 'block';
            gameActive = true;
            startTime = Date.now();
            distance = 0;
            
            gameLoop();
            spawnObstacle();
        }

        // Comandos de Teclado
        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            
            if (e.key.toLowerCase() === 'w' && !isJumping) {
                isJumping = true;
                dino.classList.add('jumping');
                setTimeout(() => {
                    dino.classList.remove('jumping');
                    isJumping = false;
                }, 600);
            }

            if (e.key.toLowerCase() === 's') {
                isDucking = true;
                dino.classList.add('ducking');
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 's') {
                isDucking = false;
                dino.classList.remove('ducking');
            }
        });

        function spawnObstacle() {
            if (!gameActive) return;

            const obs = document.createElement('div');
            obs.className = 'obstacle';
            
            // Define se é obstáculo alto (precisa agachar) ou baixo (precisa pular)
            const isHigh = Math.random() > 0.7;
            if (isHigh) {
                obs.style.bottom = '220px'; // No ar
                obs.style.background = 'yellow';
            }

            obs.dataset.z = -2000; // Começa longe
            obs.dataset.type = isHigh ? 'high' : 'low';
            world.appendChild(obs);
            obstacles.push(obs);

            setTimeout(spawnObstacle, Math.random() * 2000 + 1000 / (gameSpeed/5));
        }

        function gameLoop() {
            if (!gameActive) return;

            // Atualiza HUD
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            timeVal.innerText = elapsed;
            distance += Math.floor(gameSpeed / 2);
            distVal.innerText = distance;

            // Aumenta velocidade gradualmente
            gameSpeed += 0.001;

            // Move Obstáculos
            obstacles.forEach((obs, index) => {
                let z = parseFloat(obs.dataset.z);
                z += gameSpeed * 5; // Move em direção à câmera
                obs.dataset.z = z;
                
                // Aplica transformação 3D baseada no Z
                // Conforme o Z aumenta (chega perto de 0), o objeto cresce e desce
                obs.style.transform = `translateX(-50%) translateZ(${z}px)`;

                // Colisão simples quando o Z chega perto de 0 (onde o dino está)
                if (z > -100 && z < 50) {
                    const type = obs.dataset.type;
                    
                    if (type === 'low' && !isJumping) {
                        gameOver();
                    } 
                    else if (type === 'high' && !isDucking) {
                        gameOver();
                    }
                }

                // Remove obstáculos que passaram
                if (z > 500) {
                    obs.remove();
                    obstacles.splice(index, 1);
                }
            });

            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameActive = false;
            alert(`Fim de Jogo!\nDistância: ${distance}m\nTempo: ${timeVal.innerText}s`);
            location.reload(); // Reinicia a página
        }
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rat Run 3D - Escape dos Gatos</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --rat-gray: #888;
            --cat-orange: #ff9800;

            margin: 0;
            background-color: #0a0a0c;
            color: white;
            font-family: 'Orbitron', sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* --- Tela Inicial --- */
        #home-screen {
            position: absolute;
            z-index: 100;
            text-align: center;
            background: rgba(15, 15, 20, 0.95);
            padding: 50px;
            border: 3px solid var(--neon-blue);
            border-radius: 20px;
            box-shadow: 0 0 30px var(--neon-blue), inset 0 0 15px var(--neon-blue);
        }

        h1 { font-size: 3.5rem; margin: 0; color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }
        .controls-hint { margin: 20px 0; font-size: 1rem; color: #aaa; }

        button {
            padding: 15px 50px;
            font-size: 1.5rem;
            background: var(--neon-blue);
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        button:hover { transform: scale(1.1); box-shadow: 0 0 40px var(--neon-blue); }

        /* --- HUD --- */
        #hud {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            font-family: 'Courier New', Courier, monospace;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-left: 5px solid var(--neon-pink);
            display: none;
        }
        .stat { font-size: 1.4rem; margin-bottom: 5px; }
        .stat span { color: var(--neon-blue); font-weight: bold; }

        /* --- Mundo 3D --- */
        #game-container {
            width: 100vw;
            height: 100vh;
            perspective: 1000px;
            display: none;
            background: linear-gradient(to bottom, #000 0%, #1a0b2e 100%);
        }

        #world {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        /* Chão Gradeado */
        #floor {
            position: absolute;
            width: 400%;
            height: 4000px;
            background: 
                linear-gradient(transparent 0%, var(--neon-pink) 1%),
                linear-gradient(90deg, transparent 0%, var(--neon-pink) 1%);
            background-size: 100px 100px;
            left: -150%;
            bottom: 0;
            transform: rotateX(80deg);
            transform-origin: bottom;
            animation: moveFloor 1.5s linear infinite;
            opacity: 0.4;
        }

        @keyframes moveFloor {
            from { background-position: 0 0; }
            to { background-position: 0 100px; }
        }

        /* --- PERSONAGENS (CSS ART) --- */
        
        /* Ratinho */
        #rat {
            position: absolute;
            bottom: 120px;
            left: 50%;
            width: 50px;
            height: 40px;
            background: var(--rat-gray);
            border-radius: 50% 50% 40% 40%;
            transform: translateX(-50%) translateZ(0);
            transform-style: preserve-3d;
            transition: transform 0.15s, height 0.1s, bottom 0.1s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        /* Orelhas do Rato */
        #rat::before, #rat::after {
            content: '';
            position: absolute;
            top: -10px;
            width: 20px;
            height: 20px;
            background: #ffb6c1;
            border-radius: 50%;
            border: 3px solid var(--rat-gray);
        }
        #rat::before { left: -5px; }
        #rat::after { right: -5px; }

        /* Gato (Obstáculo) */
        .cat {
            position: absolute;
            width: 100px;
            height: 120px;
            background: var(--cat-orange);
            left: 50%;
            bottom: 120px;
            transform-style: preserve-3d;
            border-radius: 10px 10px 0 0;
            box-shadow: 0 0 20px rgba(255, 152, 0, 0.5);
        }
        /* Orelhas e Olhos do Gato */
        .cat::before {
            content: '▲ ▲';
            position: absolute;
            top: -30px;
            width: 100%;
            text-align: center;
            font-size: 30px;
            color: var(--cat-orange);
        }
        .cat-eyes {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        .cat-eyes::after, .cat-eyes::before {
            content: '';
            width: 15px;
            height: 15px;
            background: yellow;
            border-radius: 50%;
            box-shadow: 0 0 10px yellow;
            animation: blink 0.5s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Estados */
        .jumping { transform: translateX(-50%) translateY(-180px) rotateX(-10deg) !important; }
        .ducking { height: 20px !important; width: 65px !important; }

    </style>
</head>
<body>

    <div id="home-screen">

        </p>
        <button onclick="startGame()">CORRER!</button>
    </div>

    <div id="hud">

                <div style="position:absolute; bottom:5px; right:10px; width:5px; height:5px; background:black; border-radius:50%"></div>
            </div>
        </div>
    </div>

    <script>
        const rat = document.getElementById('rat');
        const homeScreen = document.getElementById('home-screen');
        const gameContainer = document.getElementById('game-container');

        const distVal = document.getElementById('dist-val');
        const world = document.getElementById('world');

        let isJumping = false;
        let isDucking = false;
        let gameActive = false;
        let distance = 0;
        let startTime = 0;
        let obstacles = [];
        let gameSpeed = 6;

        function startGame() {
            homeScreen.style.display = 'none';
            gameContainer.style.display = 'block';
            hud.style.display = 'block';
            gameActive = true;
            startTime = Date.now();
            
            gameLoop();
            spawnObstacle();
        }

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            const key = e.key.toLowerCase();
            
            if (key === 'w' && !isJumping && !isDucking) {
                isJumping = true;
                rat.classList.add('jumping');
                setTimeout(() => {
                    rat.classList.remove('jumping');
                    isJumping = false;
                }, 700);
            }

            if (key === 's' && !isJumping) {
                isDucking = true;
                rat.classList.add('ducking');
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 's') {
                isDucking = false;
                rat.classList.remove('ducking');
            }
        });

        function spawnObstacle() {
            if (!gameActive) return;

            const cat = document.createElement('div');
            cat.className = 'cat';
            cat.innerHTML = '<div class="cat-eyes"></div>';
            
            const isAir = Math.random() > 0.7; // Gato que pula (tem que agachar)
            if (isAir) {
                cat.style.bottom = '230px'; 
                cat.style.background = '#555'; // Gato preto nas alturas
            }

            cat.dataset.z = -2500;
            cat.dataset.type = isAir ? 'high' : 'low';
            world.appendChild(cat);
            obstacles.push(cat);

            // Spawn progressivo
            let nextSpawn = Math.random() * 1500 + (1000 / (gameSpeed/5));
            setTimeout(spawnObstacle, nextSpawn);
        }

        function gameLoop() {
            if (!gameActive) return;

            const elapsed = Math.floor((Date.now() - startTime) / 10
