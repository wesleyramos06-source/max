<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Tiro - Simples</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #555;
            background: #000;
            cursor: crosshair;
        }
        .info {
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="info">
        <h1>Defesa Espacial</h1>
        <p>Use as <b>Setas (Esq/Dir)</b> ou <b>A/D</b> para mover. <b>Espaço</b> para atirar.</p>
        <h2 id="score">Pontos: 0</h2>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // Configurações do Canvas
        canvas.width = 600;
        canvas.height = 400;

        // Variáveis do Jogo
        let score = 0;
        let gameActive = true;

        // Jogador
        const player = {
            width: 50,
            height: 30,
            x: canvas.width / 2 - 25,
            y: canvas.height - 40,
            speed: 7,
            color: '#00ff00'
        };

        // Tiros e Inimigos
        let bullets = [];
        let enemies = [];
        let keys = {};

        // Controles
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        function spawnEnemy() {
            if(!gameActive) return;
            const size = Math.random() * 30 + 20;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                width: size,
                height: size,
                speed: Math.random() * 2 + 1,
                color: '#ff4444'
            });
        }

        function update() {
            if (!gameActive) return;

            // Movimento do Jogador
            if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= player.speed;
            if ((keys['ArrowRight'] || keys['KeyD']) && player.x < canvas.width - player.width) player.x += player.speed;

            // Atirar (Espaço)
            if (keys['Space']) {
                if (bullets.length === 0 || bullets[bullets.length - 1].y < player.y - 100) {
                    bullets.push({ x: player.x + player.width/2 - 2, y: player.y, width: 4, height: 10, speed: 8 });
                }
            }

            // Atualizar Tiros
            bullets.forEach((bullet, index) => {
                bullet.y -= bullet.speed;
                if (bullet.y < 0) bullets.splice(index, 1);
            });

            // Atualizar Inimigos
            enemies.forEach((enemy, eIndex) => {
                enemy.y += enemy.speed;

                // Fim de jogo se o inimigo passar
                if (enemy.y > canvas.height) {
                    gameOver();
                }

                // Colisão Tiro vs Inimigo
                bullets.forEach((bullet, bIndex) => {
                    if (bullet.x < enemy.x + enemy.width &&
                        bullet.x + bullet.width > enemy.x &&
                        bullet.y < enemy.y + enemy.height &&
                        bullet.y + bullet.height > enemy.y) {
                        
                        enemies.splice(eIndex, 1);
                        bullets.splice(bIndex, 1);
                        score += 10;
                        scoreElement.innerText = `Pontos: ${score}`;
                    }
                });
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar Jogador
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Desenhar Tiros
            ctx.fillStyle = '#ffff00';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

            // Desenhar Inimigos
            ctx.fillStyle = '#ff4444';
            enemies.forEach(e => ctx.fillRect(e.x, e.y, e.width, e.height));

            if (!gameActive) {
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.fillText("FIM DE JOGO", canvas.width/2 - 120, canvas.height/2);
            }
        }

        function gameOver() {
            gameActive = false;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Iniciar
        setInterval(spawnEnemy, 1000);
        gameLoop();
    </script>
</body>
</html>
