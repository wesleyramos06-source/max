<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutQuiz 3D - Recorde Infinito</title>
    <style>
        :root {
            --pitch-green: #1a6431;
            --neon-gold: #ffd700;
            --neon-red: #ff3131;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background: #050a05;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1200px;
        }

        /* --- Cenário 3D --- */
        #stadium {
            position: absolute;
            width: 100vw;
            height: 100vh;
            transform-style: preserve-3d;
            transform: rotateX(20deg);
            z-index: -1;
        }

        #pitch {
            position: absolute;
            width: 200%;
            height: 2000px;
            background: 
                linear-gradient(var(--pitch-green) 50%, #145228 50%),
                linear-gradient(90deg, transparent 49%, var(--white) 50%, transparent 51%);
            background-size: 100% 100px, 100% 100%;
            left: -50%;
            bottom: -500px;
            transform: rotateX(70deg);
            box-shadow: inset 0 0 100px #000;
        }

        /* --- Telas --- */
        .screen {
            position: absolute;
            width: 90%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--neon-gold);
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: 0.5s;
        }

        .hidden { display: none !important; }

        /* --- Elementos do Jogo --- */
        #timer-container {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--neon-gold);
            transition: width 0.1s linear;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 15px;
            font-size: 1rem;
            background: transparent;
            color: white;
            border: 1px solid var(--white);
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--neon-gold);
            color: black;
            font-weight: bold;
            transform: translateZ(20px);
        }

        #high-score-display {
            position: absolute;
            top: 20px;
            right: 20px;
            color: var(--neon-gold);
            font-size: 1.2rem;
            text-shadow: 0 0 10px gold;
        }

        .stat-box {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            font-size: 1.1rem;
        }

        /* Animação de Erro */
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div id="high-score-display">🏆 Recorde: <span id="record-val">0</span></div>

    <div id="stadium">
