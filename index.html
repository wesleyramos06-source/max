<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Dodge - JS Edition</title>
    <style>
        :root {
            --road-color: #333;
            --line-color: #fff;
            --player-color: #3498db;
            --enemy-color: #e74c3c;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        #ui {
            margin-bottom: 10px;
            text-align: center;
        }

        .score-board {
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Área da Pista */
        #game-world {
            position: relative;
            width: 350px;
            height: 600px;
            background-color: var(--road-color);
            border: 10px solid #222;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Linhas da estrada animadas */
        .line {
            position: absolute;
            width: 10px;
            height: 80px;
            background: var(--line-color);
            left: 50%;
            transform: translateX(-50%);
            border-radius: 5px;
        }

        /* Design do Carro */
        .car {
            position: absolute;
            width: 50px;
            height: 80px;
            border-radius: 8px;
            transition: left 0.1s ease-out;
            z-index: 2;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        }

        /* Detalhes do Carro (Rodas e Vidros) */
        .car::before { /* Vidro frontal */
            content: '';
            position: absolute;
            top: 15px; left: 5px; right: 5px; height: 15px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
        }

        #player {
            background: var(--player-color);
            bottom: 30px;
            left: 150px;
            border: 2px solid #2980b9;
        }

        .enemy {
            background: var(--enemy-color);
            border: 2px solid #c0392b;
        }

        .msg {
            margin-top: 15px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="score-board">KM: <span id="score">0</span></div>
    </div>

    <div id="game-world">
        <div id="player" class="car"></div>
    </div>

    <div class="msg">Use as <b>Setas Laterais</b> para pilotar</div>

    <script>
        const world = document.getElementById('game-world');
        const scoreElement = document.getElementById('score');
        const player = document.getElementById('player');

        let score = 0;
        let playerPos = 150;
        let gameActive = true;
        let speed = 5;
        const keys = {};

        // 1. Criar linhas da estrada dinamicamente
        for(let i=0; i<5; i++) {
            let line = document.createElement('div');
            line.classList.add('line');
            line.style.top = (i * 150) + "px";
            line.y = i * 150;
            world.appendChild(line);
        }

        // 2. Criar inimigo
        const enemy = document.createElement('div');
        enemy.classList.add('car', 'enemy');
        resetEnemy(enemy);
        world.appendChild(enemy);

        // Controles
        document.addEventListener('keydown', e => keys[e.code] = true);
        document.addEventListener('keyup', e => keys[e.code] = false);

        function resetEnemy(ent) {
            ent.style.top = "-100px";
            ent.style.left = Math.floor(Math.random() * 300) + "px";
            ent.y = -100;
        }

        function update() {
            if (!gameActive) return;

            // Movimentar Linhas (Efeito de velocidade)
            let lines = document.querySelectorAll('.line');
            lines.forEach(line => {
                line.y += speed;
                if (line.y > 600) line.y = -100;
                line.style.top = line.y + "px";
            });

            // Movimentar Jogador
            if (keys['ArrowLeft'] && playerPos > 5) playerPos -= 7;
            if (keys['ArrowRight'] && playerPos < 295) playerPos += 7;
            player.style.left = playerPos + "px";

            // Movimentar Inimigo
            enemy.y += speed;
            if (enemy.y > 600) {
                resetEnemy(enemy);
                score += 10;
                scoreElement.innerText = score;
                speed += 0.2; // Aumenta dificuldade gradualmente
            }
            enemy.style.top = enemy.y + "px";

            // Detecção de Colisão
            const pRect = player.getBoundingClientRect();
            const eRect = enemy.getBoundingClientRect();

            if (!(pRect.bottom < eRect.top || 
                  pRect.top > eRect.bottom || 
                  pRect.right < eRect.left || 
                  pRect.left > eRect.right)) {
                gameOver();
            }

            requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            alert(`Fim de jogo! Você percorreu ${score} KM.`);
            location.reload(); // Reinicia o jogo
        }

        requestAnimationFrame(update);
    </script>
</body>
</html>
