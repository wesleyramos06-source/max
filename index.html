<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        /* O CSS entra aqui dentro da tag <style> */
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .cartao {
            background: white;
            padding: 20px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #2563eb;
        }
    </style>
    <title>Olá Mundo Estilizado</title>
</head>
<body>

    <div class="cartao">
        <h1>Olá, Mundo!</h1>
        <p>Este código está bonitão com CSS.</p>
    </div>

</body>
</html>
