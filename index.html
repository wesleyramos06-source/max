<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Brasileirão 2026</title>
    <style>
        /* Reset e Configurações Gerais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Fundo esportivo: Substitua a URL por uma imagem de estádio se desejar */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ff88; /* Verde esportivo */
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* Container da Tabela */
        .container {
            width: 90%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            margin-bottom: 50px;
        }

        h2 {
            margin-bottom: 20px;
            border-left: 5px solid #00ff88;
            padding-left: 15px;
        }

        /* Estilização da Tabela */
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            background-color: #00ff88;
            color: #111;
            text-transform: uppercase;
            font-weight: bold;
        }

        tr:hover {
            background-color: rgba(0, 255, 136, 0.1);
            transition: 0.3s;
        }

        .posicao { font-weight: bold; width: 50px; }
        .pts { font-weight: bold; color: #00ff88; }

        /* Botão de Acesso Externo */
        .btn-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #00ff88;
            color: #111;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: transform 0.2s;
        }

        .btn-link:hover {
            transform: scale(1.05);
            background-color: #00cc6e;
        }
    </style>
</head>
<body>

    <header>
        <h1>Central do Brasileirão</h1>
        <p>Acompanhe a classificação em tempo real</p>
    </header>

    <div class="container">
        <h2>Tabela de Classificação</h2>
        
        <table>
            <thead>
                <tr>
                    <th class="posicao">Pos</th>
                    <th>Clube</th>
                    <th>Pts</th>
                    <th>PJ</th>
                    <th>V</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="posicao">1</td>
                    <td>Palmeiras</td>
                    <td class="pts">12</td>
                    <td>4</td>
                    <td>4</td>
                </tr>
                <tr>
                    <td class="posicao">2</td>
                    <td>Botafogo</td>
                    <td class="pts">10</td>
                    <td>4</td>
                    <td>3</td>
                </tr>
                <tr>
                    <td class="posicao">3</td>
                    <td>Flamengo</td>
                    <td class="pts">9</td>
                    <td>4</td>
                    <td>3</td>
                </tr>
            </tbody>
        </table>

        <a href="https://ge.globo.com/futebol/brasileirao-serie-a/" target="_blank" class="btn-link">
            Ver Tabela Completa no GE
        </a>
    </div>

</body>
</html>
